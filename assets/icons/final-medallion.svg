<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Medallón de César y Vianey</title>
  <desc id="desc">Medallón dorado con laureles y los nombres César, Vianey y el año 2026.</desc>
  <defs>
    <radialGradient id="goldFace" cx="34%" cy="27%" r="78%">
      <stop offset="0" stop-color="#fff2b8"/>
      <stop offset=".18" stop-color="#e8c96f"/>
      <stop offset=".48" stop-color="#c79d3c"/>
      <stop offset=".72" stop-color="#f0d889"/>
      <stop offset="1" stop-color="#8d6620"/>
    </radialGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#765017"/>
      <stop offset=".25" stop-color="#f3d57d"/>
      <stop offset=".5" stop-color="#9b7124"/>
      <stop offset=".78" stop-color="#ffeaa2"/>
      <stop offset="1" stop-color="#6f4a12"/>
    </linearGradient>
    <filter id="emboss" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#5d4217" flood-opacity=".65"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="2" flood-color="#fff5bf" flood-opacity=".55"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#3a2c16" flood-opacity=".35"/>
    </filter>
    <path id="leftArc" d="M 205 555 C 105 430 125 245 260 165"/>
    <path id="rightArc" d="M 595 555 C 695 430 675 245 540 165"/>
  </defs>

  <circle cx="400" cy="400" r="368" fill="url(#goldEdge)" filter="url(#softShadow)"/>
  <circle cx="400" cy="400" r="345" fill="url(#goldFace)" stroke="#7b5719" stroke-width="7"/>
  <circle cx="400" cy="400" r="311" fill="none" stroke="#f8e59e" stroke-width="7" opacity=".82"/>
  <circle cx="400" cy="400" r="292" fill="none" stroke="#8d6723" stroke-width="3" opacity=".8"/>

  <g fill="#9a7226" stroke="#f4dc8b" stroke-width="2" filter="url(#emboss)">
    <g>
      <use href="#leftArc" fill="none" stroke="#9a7226" stroke-width="8"/>
      <ellipse cx="194" cy="532" rx="18" ry="38" transform="rotate(-39 194 532)"/>
      <ellipse cx="167" cy="486" rx="18" ry="38" transform="rotate(-54 167 486)"/>
      <ellipse cx="151" cy="435" rx="18" ry="38" transform="rotate(-69 151 435)"/>
      <ellipse cx="150" cy="381" rx="18" ry="38" transform="rotate(-84 150 381)"/>
      <ellipse cx="162" cy="327" rx="18" ry="38" transform="rotate(-101 162 327)"/>
      <ellipse cx="187" cy="276" rx="18" ry="38" transform="rotate(-117 187 276)"/>
      <ellipse cx="221" cy="226" rx="18" ry="38" transform="rotate(-133 221 226)"/>
      <ellipse cx="250" cy="186" rx="16" ry="34" transform="rotate(-145 250 186)"/>
    </g>
    <g>
      <use href="#rightArc" fill="none" stroke="#9a7226" stroke-width="8"/>
      <ellipse cx="606" cy="532" rx="18" ry="38" transform="rotate(39 606 532)"/>
      <ellipse cx="633" cy="486" rx="18" ry="38" transform="rotate(54 633 486)"/>
      <ellipse cx="649" cy="435" rx="18" ry="38" transform="rotate(69 649 435)"/>
      <ellipse cx="650" cy="381" rx="18" ry="38" transform="rotate(84 650 381)"/>
      <ellipse cx="638" cy="327" rx="18" ry="38" transform="rotate(101 638 327)"/>
      <ellipse cx="613" cy="276" rx="18" ry="38" transform="rotate(117 613 276)"/>
      <ellipse cx="579" cy="226" rx="18" ry="38" transform="rotate(133 579 226)"/>
      <ellipse cx="550" cy="186" rx="16" ry="34" transform="rotate(145 550 186)"/>
    </g>
  </g>

  <g text-anchor="middle" fill="#76531b" filter="url(#emboss)"
     font-family="'Cormorant Garamond', Georgia, serif">
    <text x="400" y="315" font-size="92" font-weight="600" letter-spacing="10">CÉSAR</text>
    <text x="400" y="403" font-size="48">✦</text>
    <text x="400" y="495" font-size="92" font-weight="600" letter-spacing="8">VIANEY</text>
    <text x="400" y="580" font-size="54" font-weight="500" letter-spacing="14">2026</text>
  </g>

  <circle cx="400" cy="400" r="330" fill="none" stroke="#fff8c9" stroke-width="4" opacity=".38"/>
</svg>
